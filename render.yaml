services:
  - type: web
    name: merchants-ledger-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: merchants-ledger-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: merchants-ledger-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: merchants-ledger-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: merchants-ledger-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: merchants-ledger-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://YOUR-RENDER-FRONTEND.onrender.com

  - type: web
    name: merchants-ledger-frontend
    runtime: docker
    rootDir: front-end
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://YOUR-RENDER-BACKEND.onrender.com
databases:
  - name: merchants-ledger-db
    plan: free
    ipAllowList: []

